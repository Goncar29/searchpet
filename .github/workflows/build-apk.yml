name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/packages/mobile/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend/packages/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project
        working-directory: frontend/packages/mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
          EXPO_PUBLIC_MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}

      # Compose Compiler 1.5.15 requiere Kotlin 1.9.25.
      # build.gradle define kotlinVersion='1.9.25' pero el classpath no usa esa variable.
      # Parcheamos el classpath para inyectar la versión explícitamente.
      - name: Patch Kotlin version in classpath
        working-directory: frontend/packages/mobile/android
        run: |
          sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath(\"org.jetbrains.kotlin:kotlin-gradle-plugin:\${kotlinVersion}\")/" build.gradle
          echo "=== Kotlin classpath after patch ==="
          grep "kotlin-gradle-plugin" build.gradle

      - name: Build APK
        working-directory: frontend/packages/mobile/android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv frontend/packages/mobile/android/app/build/outputs/apk/release/app-release.apk \
             SearchPet-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SearchPet-APK
          path: SearchPet-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SearchPet-*.apk
          body: |
            ## SearchPet ${{ github.ref_name }}

            ### Instalar en Android
            1. Descargar SearchPet-${{ github.ref_name }}.apk
            2. Abrir el archivo en tu teléfono
            3. Si aparece advertencia, tocar "Instalar de todas formas"

            ### iOS / Todos los dispositivos
            Instala la web app desde el navegador: agrega a tu pantalla de inicio.
          draft: false
          prerelease: false
