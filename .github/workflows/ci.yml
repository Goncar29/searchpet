name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Backend Tests (Go)
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lostpets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lostpets_test?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./... -v

      - name: Build
        working-directory: ./backend
        run: go build -o main ./cmd/server

  # ============================================
  # Frontend Lint & Build (Web)
  # ============================================
  frontend-web:
    name: Frontend Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/packages/web/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/packages/web
        run: npm ci --legacy-peer-deps

      - name: Security audit
        working-directory: ./frontend/packages/web
        run: npm audit --audit-level=high

      - name: Test
        working-directory: ./frontend/packages/web
        run: npm run test:run

      - name: Build
        working-directory: ./frontend/packages/web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: npx vite build

  # ============================================
  # Deploy Backend (Railway)
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: lost-pets-api

  # ============================================
  # Deploy Web (Vercel)
  # ============================================
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [frontend-web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend/packages/web

  # ============================================
  # Mobile Build (Expo EAS) — solo en main
  # Requiere secrets: EXPO_TOKEN
  # ============================================
  mobile-build:
    name: Mobile Build (EAS Production)
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/packages/mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./frontend/packages/mobile
        run: npm ci

      - name: Security audit
        working-directory: ./frontend/packages/mobile
        # expo@52 tiene vulnerabilidades high en su cadena de build tooling (tar, jsdom, postcss
        # en metro/cli) que requieren bajar expo a 49 para corregir. No afectan código de producción.
        # Se audita en nivel critical hasta que expo publique un fix.
        run: npm audit --audit-level=critical

      - name: Test
        working-directory: ./frontend/packages/mobile
        run: npm run test:run

      - name: Build (EAS production)
        working-directory: ./frontend/packages/mobile
        run: eas build --platform all --profile production --non-interactive
