name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Backend Tests (Go)
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lostpets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lostpets_test?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./... -v

      - name: Build
        working-directory: ./backend
        run: go build -o main ./cmd/server

  # ============================================
  # Frontend Lint & Build (Web)
  # ============================================
  frontend-web:
    name: Frontend Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/packages/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend/packages/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Security audit
        working-directory: ./frontend/packages/web
        run: pnpm audit --audit-level=high

      - name: Test
        working-directory: ./frontend/packages/web
        run: pnpm run test:run

      - name: Build
        working-directory: ./frontend/packages/web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: pnpm run build

  # ============================================
  # Mobile Tests (Jest + jest-expo)
  # ============================================
  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/packages/mobile
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/packages/mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:run

  # ============================================
  # E2E Tests (Web — Playwright + real backend)
  # Runs only on push to main to keep PR feedback fast.
  # ============================================
  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    needs: [frontend-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lostpets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lostpets_test?sslmode=disable
      JWT_SECRET: test-secret-e2e
      PORT: 8080
      REDIS_URL: ""
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      FIREBASE_KEY: ""
      SENDGRID_API_KEY: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: ""
      RATE_LIMIT_AUTH_MAX: "100"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: ./backend
        run: go build -o bin/server ./cmd/server

      - name: Start backend
        working-directory: ./backend
        run: ./bin/server > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:8080/api/stats; do sleep 2; done' || \
          (echo "=== BACKEND LOGS ===" && cat /tmp/backend.log && exit 1)

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/packages/web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: ./frontend/packages/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build web
        working-directory: ./frontend/packages/web
        env:
          VITE_API_URL: http://localhost:8080
        run: pnpm run build

      - name: Start web preview
        working-directory: ./frontend/packages/web
        run: pnpm run preview &

      - name: Install Playwright browsers
        working-directory: ./frontend/packages/web
        run: npx playwright install chromium --with-deps

      - name: Run Go e2e flow tests
        working-directory: ./backend
        run: go test -tags e2e -count=1 -v ./tests/e2e/...

      - name: Run Playwright tests
        working-directory: ./frontend/packages/web
        run: pnpm run test:e2e
        env:
          API_URL: http://localhost:8080

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/packages/web/playwright-report/

  # ============================================
  # Deploy Backend (Render) — requiere RENDER_DEPLOY_HOOK_URL en GitHub Secrets
  # Obtenerlo en: Render Dashboard → tu servicio → Settings → Deploy Hook
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ============================================
  # Deploy Web (Vercel) — auto-deploy via GitHub integration
  # Vercel re-deploya automáticamente en cada push a main si el repo está conectado.
  # No se necesita job aquí. Si querés deploy manual, descomentar y agregar tokens.
  # ============================================
  # deploy-web:
  #   name: Deploy Web
  #   runs-on: ubuntu-latest
  #   needs: [frontend-web]
  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Deploy to Vercel
  #       uses: amondnet/vercel-action@v25
  #       with:
  #         vercel-token: ${{ secrets.VERCEL_TOKEN }}
  #         vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
  #         vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
  #         working-directory: ./frontend/packages/web

  # ============================================
  # Mobile APK — se genera via build-apk.yml al pushear un tag v*
  # Ejemplo: git tag v1.0.1 && git push origin v1.0.1
  # El APK queda publicado en GitHub Releases automáticamente.
  # ============================================
