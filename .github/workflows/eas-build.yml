name: EAS Build

on:
  push:
    branches:
      - main
    paths:
      - "frontend/packages/mobile/**"
      - ".github/workflows/eas-build.yml"

# Salta si el commit tiene [skip ci]
concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Production Build
    runs-on: ubuntu-latest
    # No ejecutar en commits de bump de versión
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    defaults:
      run:
        working-directory: frontend/packages/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/packages/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate EAS auth
        run: eas whoami

      - name: Check build quota
        run: eas build:list --platform all --limit 5 --non-interactive

      - name: Build (Android + iOS)
        run: eas build --platform all --profile production --non-interactive
