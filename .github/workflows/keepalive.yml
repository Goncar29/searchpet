name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://searchpet.onrender.com/health)
          echo "Health check: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
